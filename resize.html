<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lienzo de Aplicación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            overflow: hidden;
            width: 100%; height: 100%;
            background-color: #1a1a1a;
        }
        /* El Lienzo Base */
        #canvas {
            position: absolute;
            background-color: #2c3e50;
            overflow: hidden;
            /* Centrado de hijos (ventanas) */
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<script>
    // 1. Crear el Lienzo (Base Gráfica)
    const canvas = document.createElement('div');
    canvas.id = 'canvas';
    document.body.appendChild(canvas);

    function actualizarLienzo() {
        const margen = 10;
        canvas.style.top = margen + 'px';
        canvas.style.left = margen + 'px';
        canvas.style.width = (window.innerWidth - (margen * 2)) + 'px';
        canvas.style.height = (window.innerHeight - (margen * 2)) + 'px';
    }

    // 2. Función para dibujar una "Ventana" sobre el lienzo
    function crearVentana(titulo, ancho, alto) {
        const win = document.createElement('div');
        // Usamos clases de Bootstrap: card para la estructura y shadow para profundidad
        win.className = 'card shadow-lg border-dark';
        
        // Estilos de dimensiones fijas y centrado
        win.style.width = ancho + 'px';
        win.style.height = alto + 'px';
        win.style.position = 'absolute'; // Permite que el flex del padre la ubique al centro

        win.innerHTML = `
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <span class="fw-bold">${titulo}</span>
                <button class="btn btn-sm btn-outline-light" onclick="this.closest('.card').remove()">×</button>
            </div>
            <div class="card-body bg-light text-dark">
                <p class="small text-muted">Ventana de ${ancho}x${alto}</p>
                <div class="mt-3">
                    <button class="btn btn-primary w-100">Acción</button>
                </div>
            </div>
            <div class="card-footer text-end py-1">
                <small class="text-secondary">DPX: ${window.devicePixelRatio}</small>
            </div>
        `;

        canvas.appendChild(win);
    }

    // Inicialización
    window.addEventListener('resize', actualizarLienzo);
    actualizarLienzo();

    // Dibujamos una ventana de ejemplo de 320x400 (típica de móvil)
    crearVentana("Configuración", 300, 350);

</script>
</body>
</html>
