<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Programático Bootstrap</title>
    <!-- Importamos Bootstrap 5 desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Eliminamos el scroll por defecto para que el margen no cause desbordamiento */
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>

<script>
    // 1. Crear el elemento DIV
    const miDiv = document.createElement('div');

    // 2. Asignar clases de Bootstrap
    // bg-primary (azul), d-flex y justify-content-center (centrar contenido)
    miDiv.className = 'bg-primary text-white d-flex align-items-center justify-content-center shadow-lg';
    miDiv.innerHTML = '<h1>Contenedor Dinámico</h1>';

    // 3. Función para ajustar el tamaño dinámicamente
    function ajustarTamano() {
        const margen = 10; // 10px en las 4 direcciones
        
        // Calculamos el ancho y alto restando el margen doble (izquierda+derecha / arriba+abajo)
        miDiv.style.position = 'absolute';
        miDiv.style.top = margen + 'px';
        miDiv.style.left = margen + 'px';
        miDiv.style.width = `calc(100vw - ${margen * 2}px)`;
        miDiv.style.height = `calc(100vh - ${margen * 2}px)`;
    }

    // 4. Ejecutar la función al cargar y al hacer resize
    window.addEventListener('resize', ajustarTamano);
    ajustarTamano();

    // 5. Insertar el div en el body
    document.body.appendChild(miDiv);
</script>

</body>
</html>
